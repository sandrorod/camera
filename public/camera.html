<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f14" />
    <title>Câmera - MaxLive</title>
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div class="page page-broadcaster">
        <div id="banner-video-congelado" class="banner-alerta hidden">
            ⚠️ A transmissão pode ter congelado enquanto o app estava em segundo plano. Volte a deixar esta tela em primeiro plano para retomar.
        </div>

        <div id="banner-no-ar" class="banner-no-ar hidden">
            🔴 SUA CÂMERA ESTÁ NO AR
        </div>

        <main class="camera-stage">
            <video id="local-preview" autoplay playsinline muted></video>

            <div id="connection-overlay" class="connection-overlay">
                <p>Solicitando permissão da câmera...</p>
            </div>

            <div class="quality-indicator" id="quality-indicator">
                <span id="quality-label">--</span>
                <span id="fps-label">-- fps</span>
            </div>
        </main>

        <section class="controls-panel">
            <div class="controls-row">
                <button id="btn-start" class="btn btn-primary">Iniciar Transmissão</button>
                <button id="btn-stop" class="btn btn-danger hidden">Parar Transmissão</button>
                <button id="btn-switch-camera" class="btn btn-secondary">Alternar Câmera</button>
            </div>

            <div class="controls-row controls-row-select">
                <label class="select-field">
                    <span>Seu nome</span>
                    <input type="text" id="input-nome-torcedor" placeholder="Ex: João" maxlength="60" />
                </label>

                <label class="select-field">
                    <span>Torcendo pra</span>
                    <input type="text" id="input-time-torcedor" placeholder="Ex: Flamengo" maxlength="60" />
                </label>
            </div>

            <p id="status-message" class="status-message"></p>
        </section>

        <button id="btn-abrir-chat" class="btn-abrir-chat" title="Conversar com o dashboard" aria-label="Chat">💬<span id="chat-badge-camera" class="chat-badge hidden">0</span></button>

        <div id="chat-modal" class="chat-modal hidden">
            <div class="chat-modal-backdrop"></div>
            <div class="chat-modal-box">
                <div class="chat-modal-header">
                    <span>Chat</span>
                    <button id="btn-fechar-chat-modal" class="btn-fechar-modal" title="Fechar" aria-label="Fechar">&times;</button>
                </div>
                <div id="chat-mensagens" class="chat-mensagens"></div>
                <form id="chat-form" class="chat-form">
                    <input id="chat-input" type="text" placeholder="Digite uma mensagem..." maxlength="500" autocomplete="off" />
                    <button type="submit" class="btn btn-primary btn-small">Enviar</button>
                </form>
            </div>
        </div>

        <template id="template-chat-mensagem">
            <div class="chat-mensagem">
                <span class="chat-mensagem-texto"></span>
                <span class="chat-mensagem-hora"></span>
            </div>
        </template>
    </div>

    <script src="/config.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.body.innerHTML = '<div class="page page-home"><div class="home-card"><h1>Token ausente</h1><p>Acesse esta página a partir do link compartilhado pelo dashboard.</p></div></div>';
            throw new Error('Token ausente na URL.');
        }

        window.__SECURITYCAM_CONFIG__ = {
            token,
            serverUrl: window.SECURITYCAM_SERVER_URL
        };
    </script>
    <script src="/js/webrtc-common.js"></script>
    <script src="/js/camera.js"></script>
</body>
</html>
