<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f14" />
    <title>SecurityCam - Dashboard</title>
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div class="page page-dashboard">
        <header class="topbar">
            <div class="topbar-left">
                <span class="rec-dot"></span>
                <h1 class="dashboard-title">SecurityCam</h1>
            </div>
        </header>

        <section class="share-section">
            <label class="field-label">Link para conectar câmeras</label>
            <div class="share-link-row">
                <input id="input-link-atual" class="session-link-input" type="text" readonly />
                <button id="btn-qrcode-link" class="btn btn-secondary btn-small" title="Mostrar QR code">QR Code</button>
                <button id="btn-copiar-link" class="btn btn-secondary btn-small">Copiar</button>
            </div>

            <button id="btn-gerar-novo-link" type="button" class="btn btn-primary">Gerar novo link</button>
        </section>

        <div id="qrcode-modal" class="qrcode-modal hidden">
            <div class="qrcode-modal-backdrop"></div>
            <div class="qrcode-modal-box">
                <button id="btn-fechar-qrcode-modal" class="btn-fechar-modal" title="Fechar" aria-label="Fechar">&times;</button>
                <div id="qrcode-canvas"></div>
                <p class="qrcode-hint">Aponte a câmera do celular para conectar</p>
            </div>
        </div>

        <main class="dashboard-main">
            <div id="empty-state" class="empty-state hidden">
                <p>Nenhuma câmera conectada ainda.</p>
                <p class="empty-state-hint">Compartilhe o link ou o QR code acima com o celular que será usado como câmera.</p>
            </div>
            <div id="cameras-grid" class="cameras-grid"></div>
        </main>
    </div>

    <template id="template-camera-card">
        <div class="camera-card">
            <video autoplay playsinline muted></video>
            <span class="camera-card-label">Conectando...</span>
            <span class="camera-card-viewers" title="Pessoas assistindo esta câmera">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5C21.3 7.6 17 4.5 12 4.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>
                <span class="camera-card-viewers-count">0</span>
            </span>
            <div class="camera-card-actions">
                <button class="btn-selecionar-camera" title="Exibir esta câmera no link único de visualização" aria-label="Selecionar">✅</button>
                <button class="btn-copiar-camera-individual" title="Copiar link fixo desta câmera" aria-label="Copiar link desta câmera">📹</button>
                <button class="btn-copiar-camera-link" title="Copiar link único (mostra a câmera selecionada)" aria-label="Copiar link único">🔗</button>
                <button class="btn-silenciar-camera" title="Silenciar áudio para quem está assistindo" aria-label="Silenciar">🔊</button>
                <button class="btn-desconectar-camera" title="Desconectar esta câmera" aria-label="Desconectar">❌</button>
            </div>
        </div>
    </template>

    <script src="/config.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        window.__SECURITYCAM_CONFIG__ = {
            serverUrl: window.SECURITYCAM_SERVER_URL
        };
    </script>
    <script src="/js/qrcode.js"></script>
    <script src="/js/webrtc-common.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
